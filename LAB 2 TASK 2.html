<html>
    <head>
        <title>LAB 2 TASK 2</title>
    </head>
    <body>
        <script>
      const downloadImage = new Promise((resolve, reject) => {
    const isSuccess = true; 
    setTimeout(() => {
      if (isSuccess) {
        resolve("https://unsplash.com/s/photos/sports-car"); 
      } else {
        reject("Download failed."); 
      }
    }, 2000);
  });

  downloadImage
    .then(url => console.log("Success:", url))
    .catch(error => console.error("Error:", error));
        </script>
    </body>
</html>
