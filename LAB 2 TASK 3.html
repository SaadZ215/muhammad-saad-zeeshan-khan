<html>
    <head>
        <title>LAB 2 TASK 3</title>
    </head>
    <body>
        <script>
      const fetchProductIDs = () => {
    return new Promise(resolve => {
      setTimeout(() => resolve([101, 102, 103]), 1000);
    });
  };

  const fetchProductDetails = (id) => {
    return new Promise((resolve, reject) => {
      const networkError = false; 
      setTimeout(() => {
        if (networkError) {
          reject("Network connection failed."); 
        } else {
          resolve({ id: id, name: "Product A" }); 
        }
      }, 1000);
    });
  };

  fetchProductIDs()
    .then(ids => fetchProductDetails(ids[0])) 
    .then(product => console.log("Product Details:", product))
    .catch(error => console.error("Error occurred:", error));

        </script>
    </body>
</html>
